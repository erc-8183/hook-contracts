[profile.default]
src = "contracts"
test = "test"
out = "out"
cache_path = "cache"
libs = ["lib"]

# Solidity version
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 200

# Testing
verbosity = 3
fuzz_runs = 256

# Gas reporting
gas_reports = ["*"]

# Coverage
coverage = true

[profile.ci]
verbosity = 4
fuzz_runs = 1000
